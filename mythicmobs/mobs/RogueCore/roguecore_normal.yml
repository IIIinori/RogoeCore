# RogueCore generated MythicMobs config
# 部署说明:
# 1. 复制 mythicmobs/mobs/RogueCore 到 plugins/MythicMobs/mobs/RogueCore
# 2. 复制 attributeplus/script/RogueCore 到 plugins/AttributePlus/script/RogueCore
# 3. 重载 AttributePlus 脚本或重启服务器
# 4. 执行 /mm reload
# 5. 执行 /rogue admin check 检查缺失怪物 ID
# 注意: 本配置使用 AttributePlus: 节点写怪物攻防属性；生命请使用 MythicMobs 原生 Health。
# AP monster attributes are written in the AttributePlus block.
# If your AttributePlus-MythicMobs hook uses another node name, only this block needs format conversion.

