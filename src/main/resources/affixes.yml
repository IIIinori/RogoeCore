# ================================
# RogueCore 副本词缀配置
# ================================
# type: 词缀效果类型
#   MOB_HP_MULTIPLY   — 怪物生命倍率
#   MOB_COUNT_MULTIPLY — 怪物数量倍率
#   MOB_SPEED         — 怪物移速加成
#   FLOOR_FIRE        — 地板着火（周期性点燃玩家）
#   NO_HEAL           — 禁止自然回复
#   SHARD_MULTIPLY    — 碎片奖励倍率
#   EXTRA_BOON        — 通关房间额外给一次 Boon
#   WEAPON_LUCK       — 武器掉率倍率
#
# difficulty: true=增加难度, false=增加奖励
# value: 效果数值（倍率类为乘数，如 1.5 = 150%）
# min-floor: 该词缀最早出现楼层
# advanced: 是否属于高层进阶词缀池
# weight: 随机权重

# 词缀选取规则
rules:
  # 楼层范围 -> [最少词缀数, 最多词缀数]
  "1-3": [0, 1]
  "4-8": [1, 2]
  "9-99": [2, 3]

