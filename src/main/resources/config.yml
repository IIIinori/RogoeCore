room-weights:
  COMBAT: 60
  ELITE: 10
  SHOP: 10
  FORGE: 6
  CHEST: 10
  REST: 8
  EXTRACTION: 4
  CONTRACT: 4
  TRIAL: 6
  GAMBLE: 3
  SHRINE: 3

room-diversity:
  enabled: true
  post-cap-multiplier: 0.35
  unique-types:
    - EXTRACTION
  soft-caps:
    SHOP: 2
    FORGE: 2
    REST: 2
    EXTRACTION: 1
    CONTRACT: 2
    TRIAL: 2
    GAMBLE: 1
    SHRINE: 1

soul-shards:
  per-room-clear: 5
  per-dungeon-clear: 50
  floor-multiplier: 0.2
  death-penalty: 0.5

database:
  file: "data.db"
  table: "roguecore_playerdata"

party:
  max-size: 4
  invite-timeout: 60
