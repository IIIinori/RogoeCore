# ================================
# RogueCore 主配置文件
# ================================

# 地牢生成设置
dungeon:
  # 基础宽度（方块数，随楼层递增）
  base-width: 80
  # 每层增加的宽度
  width-per-floor: 5
  # BSP 最小分区尺寸
  min-partition-size: 16
  # 房间最小外框尺寸，默认已上调，避免生成接近走廊宽度的小房间
  min-room-size: 12
  # 房间净高（不含地板和天花板）
  room-height: 4
  # 走廊宽度
  corridor-width: 3
  # 生成 Y 坐标
  floor-level: 64
  hidden-room:
    # 是否启用隐藏宝藏房
    enabled: true
    # 生成隐藏房的概率
    chance: 0.45
    # 精英房掉落隐藏钥匙概率
    elite-key-chance: 0.35
    # Boss 房固定掉落的隐藏钥匙数量
    boss-keys: 1

# 楼层主题配置
# 格式: 楼层范围 -> 主题
# 主题材质使用 TabooLib XMaterial 名称
floors:
  crypt:
    name: "地下墓穴"
    range: "1-5"
    bsp-depth: 3
    floor: STONE_BRICKS
    wall: STONE_BRICKS
    ceiling: STONE_BRICKS
    accent: MOSSY_STONE_BRICKS
    light: SEA_LANTERN
  nether:
    name: "岩浆深渊"
    range: "6-10"
    bsp-depth: 4
    floor: NETHER_BRICKS
    wall: NETHER_BRICKS
    ceiling: NETHER_BRICKS
    accent: RED_NETHER_BRICKS
    light: GLOWSTONE
  end:
    name: "虚空圣殿"
    range: "11-15"
    bsp-depth: 5
    floor: END_STONE_BRICKS
    wall: PURPUR_BLOCK
    ceiling: PURPUR_BLOCK
    accent: END_STONE
    light: END_ROD

# 房间类型分配权重（中间房间随机分配）
room-weights:
  COMBAT: 60
  ELITE: 10
  SHOP: 10
  FORGE: 6
  CHEST: 10
  REST: 8
  EXTRACTION: 4
  CONTRACT: 4
  TRIAL: 6
  GAMBLE: 3
  SHRINE: 3

# 房型多样性控制
room-diversity:
  # 是否对重复房型进行软抑制
  enabled: true
  # 超过 soft-caps 后的权重衰减倍率
  post-cap-multiplier: 0.35
  # 这些房型默认同一层只允许出现一次
  unique-types:
    - EXTRACTION
  # 这些房型在同一层达到数量后，后续仍可出现，但权重会明显下降
  soft-caps:
    SHOP: 2
    FORGE: 2
    REST: 2
    EXTRACTION: 1
    CONTRACT: 2
    TRIAL: 2
    GAMBLE: 1
    SHRINE: 1

# 灵魂碎片奖励设置
soul-shards:
  # 每清一个战斗房间获得的碎片
  per-room-clear: 5
  # 通关整个副本的额外奖励
  per-dungeon-clear: 50
  # 楼层倍率（实际碎片 = 基础碎片 * (1 + (楼层-1) * multiplier)）
  floor-multiplier: 0.2
  # 死亡惩罚（死亡时只获得该比例的已积累碎片）
  death-penalty: 0.5

# 数据库设置
database:
  # SQLite 文件名（存放在插件目录下）
  file: "data.db"
  # DatabasePlayer 使用的键值表名
  table: "roguecore_playerdata"

# 组队设置
party:
  # 队伍最大人数
  max-size: 4
  # 邀请超时时间（秒）
  invite-timeout: 60
