# ================================
# RogueCore 临时装备配置
# ================================
#
# 属性行会直接写入 lore，交给 AttributePlus 自动读取。
# 属性键名请使用你服务器 AP 实际配置中的属性名。
# 若属性键以 % 结尾，则会被渲染为百分比属性，例如：
#   暴击几率%: [3, 5]
# 会显示为：
#   暴击几率: +3~5 (%)

rules:
  chest-chance: 0.45
  elite-count: 1
  boss-count: 1
  ap-percentage-mark: "(%)"
  drop-protection:
    enabled: true
    empty-slot-weight: 2.1
    duplicate-slot-penalty: 0.72
    upgrade-score-scale: 0.02
    max-upgrade-bonus: 0.75
    downgrade-penalty-scale: 0.012
    min-weight-factor: 0.25
  source-bonus:
    BOSS:
      extra-affixes: 1
      rarity-upgrade-chance: 0.55
    HIDDEN:
      extra-affixes: 1
      rarity-upgrade-chance: 0.35

identification:
