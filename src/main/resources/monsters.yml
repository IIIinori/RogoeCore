# ================================
# RogueCore 怪物配置
# ================================
# 1-100 层怪物池。MythicMobs 侧需要提供对应 ID，RogueCore 自检会列出缺失项。

floors:
  crypt:
    range: "1-5"
    combat:
      normal-mobs:
        - "rogue_crypt_bonewalker"
        - "rogue_crypt_grave_hound"
        - "rogue_crypt_dust_acolyte"
        - "rogue_crypt_crypt_lurker"
        - "rogue_crypt_tomb_guard"
      base-count: 3
      count-per-floors: 3
      max-count: 6
    elite:
      mobs:
        - "rogue_crypt_elite_vanguard"
        - "rogue_crypt_elite_arcanist"
        - "rogue_crypt_elite_executioner"
      count: 1
    boss:
      mob-id: "rogue_crypt_boss_floor{floor}"
      count: 1
  nether:
