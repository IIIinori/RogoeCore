# ================================
# RogueCore 怪物配置
# ================================
# 1-100 层怪物池。MythicMobs 侧需要提供对应 ID，RogueCore 自检会列出缺失项。

wave-rules:
  normal-types-min: 2
  normal-types-max: 3
  combat-density-multiplier: 0.80
  elite-adds-enabled: true
  elite-adds-types: 2
  elite-adds-total: 4
  boss-adds-enabled: true
  boss-adds-types: 3
  boss-adds-total: 7

