  rarity_upgrade_discount:
    name: "升品折扣"
    description: "永久装备升稀有度的灵魂碎片消耗降低 12%。"
    icon: NETHER_STAR
    cost: 1250
    slot: 58
    required-best-floor: 14
    requires: ["permanent_forge_cap_i", "legendary_relics"]

  salvage_accounting:
    name: "回收精算"
