    requires: ["gear_storage_ii"]

  rapid_identification:
    name: "快速鉴定"
    description: "鉴定耗时降低 15%，离线期间同样享受该研究加速。"
    icon: CLOCK
    cost: 300
    slot: 48
    required-best-floor: 5
    requires: ["treasure_cipher"]

  batch_identification:
    name: "批量鉴定"
    description: "鉴定队列容量提升 1，可同时处理更多未鉴定装备。"
    icon: SPYGLASS
    cost: 560
    slot: 49
    required-best-floor: 8
    requires: ["rapid_identification"]

  identification_discount:
    name: "鉴定折扣"
    description: "鉴定灵魂碎片消耗降低 15%，降低长期筛装成本。"
