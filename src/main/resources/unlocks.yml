    icon: BLAST_FURNACE
    cost: 680
    slot: 52
    required-best-floor: 9
    requires: ["forge_queue_expansion", "soul_tempering"]

  forge_book_hunt:
    name: "图谱搜寻"
    description: "副本中锻造书掉率提升 20%，宝箱、精英、Boss 与隐藏宝藏均生效。"
    icon: WRITABLE_BOOK
    cost: 700
    slot: 53
    required-best-floor: 9
    requires: ["treasure_cipher"]

  high_tier_schematics:
    name: "高阶图谱"
    description: "提高史诗与传说锻造书权重，让高品质打造书更常出现。"
    icon: ENCHANTED_BOOK
    cost: 1100
    slot: 54
    required-best-floor: 12
    requires: ["furnace_acceleration", "forge_book_hunt", "legendary_relics"]

  permanent_forge_cap_i:
    name: "局外锻造上限 I"
    description: "永久装备局外锻造等级上限提升 3 级。"
    icon: ANVIL
    cost: 720
    slot: 55
    required-best-floor: 8
    requires: ["soul_tempering"]

  permanent_forge_cap_ii:
    name: "局外锻造上限 II"
    description: "永久装备局外锻造等级总上限提升 5 级，释放高阶装备成长空间。"
    icon: SMITHING_TABLE
    cost: 1300
    slot: 56
    required-best-floor: 14
