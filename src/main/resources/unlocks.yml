    icon: CHEST
    cost: 240
    slot: 45
    required-best-floor: 5
    requires: ["advanced_relics"]

  gear_storage_ii:
    name: "灵械仓储 II"
    description: "装备仓库总容量提升 18 格，让多套装配有长期整理空间。"
    icon: TRAPPED_CHEST
    cost: 520
    slot: 46
    required-best-floor: 8
    requires: ["gear_storage_i"]

  gear_storage_iii:
    name: "灵械仓储 III"
    description: "装备仓库总容量提升 27 格，开放完整秘库级装备陈列。"
    icon: ENDER_CHEST
    cost: 960
    slot: 47
